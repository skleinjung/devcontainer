services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6g
    # base ships reap-vscode-sockets: it reaps VS Code's CLI/git IPC sockets, then runs
    # `command`. Requires devcontainer.json overrideCommand:false so VS Code keeps it.
    entrypoint: ['/usr/local/bin/reap-vscode-sockets']
    command: ['sleep', 'infinity']
    # Bridge networking (NOT network_mode/ipc: host) so the workspace doesn't share the
    # host's network/IPC namespaces. host.docker.internal reaches host services;
    # workspace:127.0.0.1 keeps the container hostname resolvable.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'workspace:127.0.0.1'
    hostname: workspace
    shm_size: 1g
    # Untrusted-code hardening: drop all Linux capabilities and block setuid escalation
    # (base already removes sudo). Add a specific cap back only if a tool genuinely needs it.
    cap_drop:
      - ALL
    security_opt:
      - 'no-new-privileges:true'
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.bash_history:/home/vscode/.bash_history:cached
      - ${HOME}/.claude:/home/vscode/.claude:cached
      - ${HOME}/.claude.json:/home/vscode/.claude.json:cached
      # commit-signing key only, read-only — NOT the whole ~/.ssh.
      - ${HOME}/.ssh/id_ed25519:/home/vscode/.ssh/id_ed25519:ro
      - ${HOME}/.ssh/id_ed25519.pub:/home/vscode/.ssh/id_ed25519.pub:ro
      # The credentials shelf: the sidecars vend narrow, short-lived credentials here; the
      # workspace (agents included) can only read them. base's devcred/git/gh/aws shims read it.
      - creds-shelf:/creds:ro

  # ── credential sidecars (toolkit images) — vend short-lived scoped creds to the shelf ────
  # They share `admin-home`, so a single `aws sso login` serves both; that home (the SSO
  # session) is mounted into NO consumer. Enter from a HOST terminal to log in:
  #   docker exec -it <project>-credentials-aws-1 aws sso login --profile <profile>
  credentials-aws:
    image: ghcr.io/skleinjung/devcontainers/credential-shelf-aws:latest
    init: true
    restart: unless-stopped
    environment:
      # No reachable localhost callback in here (bridge net) — use the SSO device-code flow.
      AWS_SSO_USE_DEVICE_CODE: '1'
      # Space-separated ~/.aws/config profiles to vend; the first also becomes [default].
      VEND_AWS_PROFILES: 084828575849-developer-ai-agent
    volumes:
      - admin-home:/home/vscode
      - creds-shelf:/creds

  credentials-github:
    # Derived image that bakes github-creds/installations.json (which orgs/repos to vend) —
    # a reviewed rebuild, not a /workspace bind-mount.
    build: ./github-creds
    init: true
    restart: unless-stopped
    environment:
      AWS_SSO_USE_DEVICE_CODE: '1'
      VEND_GH_APP_ID: '3967552'
      VEND_GH_KMS_KEY_ID: alias/github-app-signer
      # Holds kms:Sign on the signing key (the App key never leaves KMS).
      VEND_GH_AWS_PROFILE: 253490790167-developer-tool-user
      VEND_GH_AWS_REGION: us-east-1
    volumes:
      - admin-home:/home/vscode
      - creds-shelf:/creds

volumes:
  # Written only by the credential sidecars; read-only in the workspace.
  creds-shelf:
  # The sidecars' shared $HOME (SSO cache + ~/.aws). Never mounted into the workspace.
  admin-home:
