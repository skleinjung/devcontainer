services:
  workspace:
    build:
      args:
        USERNAME: '${USER}'
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6g
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    hostname: workspace
    ipc: host
    network_mode: host
    shm_size: 1g
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.bash_history:/home/${USER}/.bash_history:cached
      - ${HOME}/.claude:/home/${USER}/.claude:cached
      - ${HOME}/.claude.json:/home/${USER}/.claude.json:cached
      # commit-signing key only, read-only — NOT the whole ~/.ssh (no authorized_keys, no other
      # private keys).
      - ${HOME}/.ssh/id_ed25519:/home/${USER}/.ssh/id_ed25519:ro
      - ${HOME}/.ssh/id_ed25519.pub:/home/${USER}/.ssh/id_ed25519.pub:ro
      # The credentials shelf: the sidecar vends narrow, short-lived credentials here; the
      # workspace (agents included) can only read them. See twin-digital/opus#164 context.
      - creds-shelf:/creds:ro

  # Admin sidecar — the human's privileged environment (SSO sessions, personal GitHub identity,
  # lpass/ansible/terraform). Its home lives on a private volume the workspace never mounts.
  # Enter from a HOST terminal: `docker exec -it admin-sidecar bash` (or VS Code "Attach to
  # Running Container"). No sshd; host Docker access is the gate. The main process is
  # vend-daemon, which runs the credential vend loops (`docker logs admin-sidecar`).
  admin-sidecar:
    build:
      args:
        USERNAME: '${USER}'
      context: admin-sidecar
      dockerfile: Dockerfile
    command: ['vend-daemon']
    container_name: admin-sidecar
    environment:
      # No reachable localhost callback in here (bridge network, no VS Code forwarding) — the
      # dotfiles aws-refresh-sso helper honors this and uses the SSO device-code flow.
      AWS_SSO_USE_DEVICE_CODE: '1'
      # Space-separated profiles (in the admin user's ~/.aws/config) whose credentials are vended
      # to the agents. The first doubles as [default]; agents pick others via AWS_PROFILE=<name>.
      VEND_AWS_PROFILES: 084828575849-developer-ai-agent
      # GitHub App token minting — config COMMON to every installation (the signing key never
      # leaves KMS; the minting profile holds kms:Sign, agents do not). WHICH installations to
      # vend, and each one's repos/perms, live in admin-sidecar/github-installations.json (one
      # vend loop per entry — see "Adding repos and orgs" in README.md).
      VEND_GH_APP_ID: '3967552'
      VEND_GH_KMS_KEY_ID: alias/github-app-signer
      # Holds kms:Sign on the signing key
      VEND_GH_AWS_PROFILE: 253490790167-developer-tool-user
      VEND_GH_AWS_REGION: us-east-1
    hostname: admin-sidecar
    init: true
    restart: unless-stopped
    volumes:
      - admin-home:/home/${USER}
      - creds-shelf:/creds
      - ..:/workspace:cached

volumes:
  # Written only by the admin sidecar's vend scripts; read-only in the workspace.
  creds-shelf:
  # The admin sidecar's $HOME (SSO cache, gh/lpass state, dotfiles). Never mounted into the
  # workspace.
  admin-home:
